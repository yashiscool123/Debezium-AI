# Debezium Pipeline Generator Configuration
quarkus.http.port=8080
quarkus.http.root-path=/api/v1

# Database connections for introspection
quarkus.datasource.introspect.db-kind=postgresql
quarkus.datasource.introspect.username=postgres
quarkus.datasource.introspect.password=postgres
quarkus.datasource.introspect.jdbc.url=jdbc:postgresql://localhost:5432/postgres

# Kafka Connect
debezium.kafka-connect.url=http://localhost:8083

# Schema Registry
debezium.schema-registry.url=http://localhost:8081
debezium.schema-registry.type=apicurio

# AI/ML Configuration
debezium.ai.embeddings.provider=minilm
debezium.ai.embeddings.minilm.model-path=models/minilm-l6-v2
debezium.ai.llm.provider=ollama
debezium.ai.llm.ollama.url=http://localhost:11434
debezium.ai.llm.ollama.model=llama3.1

# Vector Database
debezium.vector.db.type=pgvector
debezium.vector.db.url=jdbc:postgresql://localhost:5432/vectordb
debezium.vector.db.username=postgres
debezium.vector.db.password=postgres

# Testcontainers for validation
debezium.testcontainers.enabled=true
debezium.testcontainers.reuse=true

# Logging
quarkus.log.level=INFO
quarkus.log.category."io.debezium".level=DEBUG