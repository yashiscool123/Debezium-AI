# Encryption
debezium.encryption.master-key=changeit-changeit-changeit!
debezium.encryption.salt=

# TLS / HTTPS
quarkus.http.insecure-requests=redirect
quarkus.http.ssl-port=8443

# Security headers
debezium.security.hsts.enabled=true
debezium.security.hsts.max-age=31536000

# API Key Authentication
debezium.api.key=

# Session TTL (seconds)
debezium.session.ttl=86400

# CORS (if needed)
quarkus.http.cors=false
